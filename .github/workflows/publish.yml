name: Publish to PyPI

# Triggers:
#   - v*.*.* tag  → build + publish to PyPI + create GitHub Release
#   (TestPyPI job is disabled until trusted publisher is registered at
#    https://test.pypi.org/manage/account/publishing/)
on:
  push:
    tags: ["v*.*.*"]

jobs:
  # ── 1. Build wheel + sdist ──────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 2. TestPyPI — disabled until trusted publisher is registered ───────────
  # Uncomment this job after registering at:
  # https://test.pypi.org/manage/account/publishing/
  # (project: contextduty, repo: SHUBHAGYTA24/contextduty,
  #  workflow: publish.yml, environment: testpypi)
  #
  # publish-testpypi:
  #   name: Publish to TestPyPI
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment:
  #     name: testpypi
  #     url: https://test.pypi.org/p/contextduty
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@v4
  #       with: { name: dist, path: dist/ }
  #     - uses: pypa/gh-action-pypi-publish@v1.12.4
  #       with:
  #         repository-url: https://test.pypi.org/legacy/

  # ── 3. PyPI — tagged releases only ─────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    environment:
      name: pypi
      url: https://pypi.org/p/contextduty

    permissions:
      id-token: write   # OIDC trusted publishing

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          skip-existing: true

  # ── 4. GitHub Release — auto-created from tag + release notes ──────────────
  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    runs-on: ubuntu-latest
    if: always() && needs.build.result == 'success' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Create release, or upload assets if release already exists
          gh release create "${{ github.ref_name }}" \
            dist/** \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || \
          gh release upload "${{ github.ref_name }}" \
            dist/** --clobber
