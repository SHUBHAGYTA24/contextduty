name: Security

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Run weekly on Monday at 08:00 UTC — catches new CVEs against pinned deps
    - cron: "0 8 * * 1"

jobs:
  pip-audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e ".[dev]" --dry-run 2>/dev/null | grep "Would install" | tr ' ' '\n' | grep "==" | sed 's/^//' || echo "") || pip-audit -e .

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Install package
        run: pip install -e .

      - name: Generate SBOM
        run: cyclonedx-py environment --output-format json -o sbom.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90
